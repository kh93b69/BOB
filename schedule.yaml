# Расписание напоминаний бота БОБ.
# Правка = коммит + пуш в main → Railway автодеплоит.
#
# Поля:
#   id            — уникальный идентификатор напоминания (строка)
#   chat_id       — ID чата Telegram, куда слать (узнать: /chatid в чате)
#   text          — текст сообщения
#   cron          — 5-полевой cron (мин час день месяц день_недели)
#   timezone      — IANA (опционально, default_timezone из .env если не задано)
#   enabled       — true/false (можно временно выключить без удаления)

reminders:
  # ВРЕМЕННО: smoke-test — раз в минуту. После подтверждения работы меняем на нормальный график.
  - id: smoke-test
    chat_id: -1003403579595
    text: "🧪 Smoke-test: бот БОБ живой. Это тестовое напоминание, скоро отключу."
    cron: "* * * * *"
    timezone: Asia/Almaty
    enabled: true
